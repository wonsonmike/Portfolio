<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <button class="nav-toggle" aria-label="Toggle navigation">
    ☰
  </button>

  <nav class="nav-links">
    <div></div><div></div>
    <a href="index.html"><strong>HOME</strong></a>
    <a href="about.html"><strong>ABOUT</strong></a>
    <a href="projects.html"><strong>PROJECTS</strong></a>
    <a href="contact.html" class="selected"><strong>CONTACT</strong></a>
    <div></div><div></div>
  </nav>
  
  <main>
    <section class="hero">
      <div class="hero-content">
        <h2>I'm open to work!</h2>
        <p>
          I'm open to work in any Entry Level or Junior Developer positions based in C++, Python, and/or React Native.
        </p>
        <div class="hero-buttons">
          <a href="https://www.linkedin.com/in/michael-wonson/" class="hero-button">LinkedIn</a>
          <a href="https://github.com/wonsonmike" class="hero-button">My GitHub</a>
        </div>
      </div>
      <img src="assets/headshot.jpg" alt="Photo of Michael Wonson" class="hero-image"/>
    </section>
    
    <section class="contact-section">
      <h2>Get In Touch</h2>
      <div id="form-message" class="form-message" style="display: none;"></div>
      <form id="contact-form" class="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="from_name" required placeholder="Your Name">
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="from_email" required placeholder="your.email@example.com">
        </div>
        
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required placeholder="What is this about?">
        </div>
        
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="Your message here..." rows="5"></textarea>
        </div>
        
        <button type="submit" class="submit-button">Send Message</button>
      </form>
      <p class="contact-alternative">Or email directly: <a href="mailto:wonsonmwork@gmail.com">wonsonmwork@gmail.com</a></p>
    </section>
  </main>
  
  <footer>
    <p>&copy; Michael Wonson 2026</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
